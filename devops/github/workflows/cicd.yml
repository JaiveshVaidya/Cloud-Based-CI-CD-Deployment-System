name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 123456789012.dkr.ecr.us-east-1.amazonaws.com
  BACKEND_REPO: cicd-backend
  FRONTEND_REPO: cicd-frontend
  EKS_CLUSTER_NAME: cicd-cluster

jobs:
  build-and-test:
    name: Build, Test & Package
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # Java setup & Maven build
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Run Backend Tests
      run: |
        cd backend
        chmod +x mvnw
        ./mvnw test

    - name: Build Backend JAR
      run: |
        cd backend
        ./mvnw package -DskipTests

    # Node setup & Frontend build
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build Frontend Assets
      run: |
        cd frontend
        npm ci
        npm run build

  deploy:
    name: Deploy to AWS EKS
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Log in to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build & Push Backend Docker Image
      run: |
        docker build -t ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ github.sha }} -t ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:latest -f devops/docker/Dockerfile.backend backend/
        docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:${{ github.sha }}
        docker push ${{ env.ECR_REGISTRY }}/${{ env.BACKEND_REPO }}:latest

    - name: Build & Push Frontend Docker Image
      run: |
        docker build -t ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ github.sha }} -t ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:latest -f devops/docker/Dockerfile.frontend frontend/
        docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:${{ github.sha }}
        docker push ${{ env.ECR_REGISTRY }}/${{ env.FRONTEND_REPO }}:latest

    - name: Set up Kubeconfig
      run: |
        aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER_NAME }} --region ${{ env.AWS_REGION }}

    - name: Deploy to Kubernetes
      run: |
        helm upgrade --install cicd-platform ./devops/helm \
          --namespace default \
          --set image.registry=${{ env.ECR_REGISTRY }} \
          --set image.backend.tag=${{ github.sha }} \
          --set image.frontend.tag=${{ github.sha }}
